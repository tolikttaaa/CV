<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatolii Anishchenko — CV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #000066;
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.03em; }
    header p  { font-size: 0.85rem; opacity: 0.75; margin-top: 0.2rem; }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #fff;
      color: #000066;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .download-btn:hover { opacity: 0.85; }

    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem 2rem;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
    }

    .fallback-notice {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
    }
    .fallback-notice a {
      color: #000066;
      font-weight: 600;
    }

    iframe {
      flex: 1;
      width: 100%;
      min-height: 85vh;
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      background: #fff;
    }

    footer {
      text-align: center;
      font-size: 0.78rem;
      color: #888;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Anatolii Anishchenko</h1>
      <p>Java / Kotlin Software Engineer</p>
    </div>
    <a class="download-btn" href="cv.pdf" download="AnishchenkoAA_CV.pdf">
      &#8595; Download PDF
    </a>
  </header>

  <div class="viewer">
    <iframe src="cv.pdf" title="Curriculum Vitae">
      <div class="fallback-notice">
        <p>Your browser cannot display the PDF inline.</p>
        <p><a href="cv.pdf">Click here to open the CV directly.</a></p>
      </div>
    </iframe>
  </div>

  <footer>
    Auto-compiled from <a href="https://github.com" style="color:#888">source</a> via GitHub Actions &amp; deployed to GitHub Pages.
  </footer>

</body>
</html>
